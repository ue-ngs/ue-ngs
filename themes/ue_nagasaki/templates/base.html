<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}UE長崎{% endblock %}</title>

  <meta name="description" content="{% block description %}UE長崎 — Unreal Engineと3D表現に興味を持つ人たちの、長崎発クリエイティブ・コミュニティ。{% endblock %}" />
  <meta name="theme-color" content="#08111f" />

  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="UE長崎" />
  <meta property="og:title"       content="{% block og_title %}UE長崎{% endblock %}" />
  <meta property="og:description" content="{% block og_description %}Unreal Engineと3D表現に興味を持つ人たちの、長崎発クリエイティブ・コミュニティ。{% endblock %}" />
  <meta property="og:url"         content="{{ SITEURL }}/{% block og_url %}{% endblock %}" />
  <meta property="og:image"       content="{{ SITEURL }}/{% block og_image %}images/ogp.png{% endblock %}" />

  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="{% block tw_title %}UE長崎{% endblock %}" />
  <meta name="twitter:description" content="{% block tw_description %}Unreal Engineと3D表現に興味を持つ人たちの、長崎発クリエイティブ・コミュニティ。{% endblock %}" />
  <meta name="twitter:image"       content="{{ SITEURL }}/{% block tw_image %}images/ogp.png{% endblock %}" />

  <link rel="icon" href="{{ SITEURL }}/images/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="{{ SITEURL }}/images/favicon.ico" sizes="any" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% block content %}{% endblock %}
  {% block extra_js %}{% endblock %}
  <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>

  <footer>
    <span class="copyright">© 2025 UE長崎</span>
    <span class="separator">|</span>
    <a href="{{ SITEURL }}/code-of-conduct/">行動規範</a>
  </footer>
</body>
</html>
